# Isolate from profile "local" (machine secrets / MySQL).
spring.profiles.active=test

# Test-only datasource so Spring Boot can start the full context with JPA on the classpath.
spring.datasource.url=jdbc:h2:mem:ciphervault_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.jwt.secret=test-jwt-secret-value-at-least-32-chars-long!!
app.jwt.access-token-validity-ms=900000
app.jwt.refresh-token-validity-ms=604800000

app.encryption.master-key-base64=c29tZURldk1hc3RlcktleUF0TGVhc3QzMkJ5dGVzISE=

app.storage.root-dir=${java.io.tmpdir}/ciphervault-test-storage
app.storage.default-quota-bytes=1073741824
app.storage.trash-retention-days=30

app.cors.allowed-origins=http://localhost:5173
app.frontend.base-url=http://localhost:5173
app.mail.from-address=test@local

spring.mail.host=localhost
spring.mail.port=2525

spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.quartz.job-store-type=memory
