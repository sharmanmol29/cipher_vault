spring.application.name=CipherVault

# Use profile "local" for machine-specific secrets (see application-local.properties.example).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# --- MySQL ---
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/CipherVault?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Mail ---
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# --- OAuth2 Google (override in application-local.properties) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# --- App ---
app.frontend.base-url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

app.jwt.secret=${JWT_SECRET:}
app.jwt.access-token-validity-ms=${JWT_ACCESS_MS:900000}
app.jwt.refresh-token-validity-ms=${JWT_REFRESH_MS:604800000}

app.encryption.master-key-base64=${ENCRYPTION_MASTER_KEY_BASE64:}

app.storage.root-dir=${STORAGE_ROOT:./data/storage}
app.storage.default-quota-bytes=${DEFAULT_STORAGE_QUOTA_BYTES:1073741824}
app.storage.trash-retention-days=${TRASH_RETENTION_DAYS:30}

app.mail.from-address=${MAIL_FROM:noreply@ciphervault.local}

app.security.reset-token-validity-hours=${RESET_TOKEN_HOURS:24}

logging.level.com.ciphervault=INFO

app.scheduler.trash-cleanup-cron=${TRASH_CLEANUP_CRON:0 0 3 * * *}

spring.quartz.job-store-type=memory

# Multipart upload limits
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

server.port=8081